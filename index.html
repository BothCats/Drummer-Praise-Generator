<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对你的专属夸夸</title>
    <style>
        :root {
            --primary-color: #D4AF37;
            --text-color: #FFFFFF;
            --card-bg: rgba(255, 255, 255, 0.1);
            --card-border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(-45deg, #1a0b2e, #4a148c, #0d47a1, #2c3e50);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 90%;
            width: 400px;
            border: 1px solid var(--card-border);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--primary-color);
            margin-bottom: 30px;
            font-size: 24px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .drum-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
            animation: float 3s ease-in-out infinite;
        }

        /* 敲击动画类 */
        .shake {
            animation: shake 0.1s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0) rotate(-5deg); }
            20%, 80% { transform: translate3d(2px, 0, 0) rotate(5deg); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0) rotate(-5deg); }
            40%, 60% { transform: translate3d(4px, 0, 0) rotate(5deg); }
        }

        .quote-box {
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            border-left: 4px solid var(--primary-color);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .quote-text {
            font-size: 18px;
            line-height: 1.6;
            font-weight: 300;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .btn {
            background: linear-gradient(45deg, #D4AF37, #F9E076);
            color: #1a0b2e;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .animate-pop {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="drum-icon" id="drumIcon">🥁</div>
        <h1>程序猿的专属夸夸生成！</h1>
        
        <div class="quote-box">
            <p class="quote-text" id="quote">点击按钮，接收来对程序员的节奏赞美...</p>
        </div>

        <button class="btn" id="generateBtn">开始演奏 (生成)</button>
        
        <div class="footer">
            Designed by Your Programmer Friend: [ H·L ]
        </div>
    </div>

    <script>
        // --- 1. 音频合成引擎 (Web Audio API) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        // 底鼓
        function playKick() {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.5);
        }

        // 军鼓
        function playSnare() {
            const bufferSize = audioCtx.sampleRate * 0.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'highpass';
            noiseFilter.frequency.value = 1000;
            const noiseGain = audioCtx.createGain();
            
            noise.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            
            noiseGain.gain.setValueAtTime(0.8, audioCtx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            noise.start(audioCtx.currentTime);

            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.connect(oscGain);
            oscGain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(250, audioCtx.currentTime);
            oscGain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            oscGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // 闭镲
        function playHiHatClosed() {
            const bufferSize = audioCtx.sampleRate * 0.1;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const bandpass = audioCtx.createBiquadFilter();
            bandpass.type = 'bandpass';
            bandpass.frequency.value = 10000;
            const highpass = audioCtx.createBiquadFilter();
            highpass.type = 'highpass';
            highpass.frequency.value = 7000;
            const gainNode = audioCtx.createGain();
            
            noise.connect(bandpass);
            bandpass.connect(highpass);
            highpass.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            noise.start(audioCtx.currentTime);
        }

        // 开镲
        function playHiHatOpen() {
            const bufferSize = audioCtx.sampleRate * 0.4;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const bandpass = audioCtx.createBiquadFilter();
            bandpass.type = 'bandpass';
            bandpass.frequency.value = 10000;
            const highpass = audioCtx.createBiquadFilter();
            highpass.type = 'highpass';
            highpass.frequency.value = 7000;
            const gainNode = audioCtx.createGain();
            
            noise.connect(bandpass);
            bandpass.connect(highpass);
            highpass.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            noise.start(audioCtx.currentTime);
        }

        // --- 2. 节奏编排系统 ---
        const patterns = [
            // 1. 经典摇滚
            [
                { type: 'K', time: 0 }, { type: 'H', time: 0 },
                { type: 'S', time: 300 }, { type: 'H', time: 300 },
                { type: 'K', time: 600 },
                { type: 'S', time: 900 }, { type: 'O', time: 900 }
            ],
            // 2. 三连音
            [
                { type: 'K', time: 0 }, { type: 'H', time: 0 },
                { type: 'S', time: 200 }, { type: 'H', time: 200 },
                { type: 'S', time: 400 }, { type: 'H', time: 400 },
                { type: 'K', time: 600 }, { type: 'H', time: 600 },
                { type: 'S', time: 800 }, { type: 'O', time: 800 }
            ],
            // 3. 双底鼓
            [
                { type: 'K', time: 0 }, { type: 'H', time: 0 },
                { type: 'K', time: 200 }, { type: 'H', time: 200 },
                { type: 'S', time: 400 }, { type: 'H', time: 400 },
                { type: 'K', time: 600 },
                { type: 'S', time: 900 }, { type: 'O', time: 900 }
            ],
            // 4. 切分节奏
            [
                { type: 'K', time: 0 }, { type: 'H', time: 0 },
                { type: 'S', time: 250 }, { type: 'H', time: 250 },
                { type: 'K', time: 500 }, { type: 'H', time: 500 },
                { type: 'S', time: 850 }, { type: 'O', time: 850 }
            ],
            // 5. 快速滚奏
            [
                { type: 'K', time: 0 }, { type: 'H', time: 0 },
                { type: 'S', time: 150 }, { type: 'H', time: 150 },
                { type: 'K', time: 300 }, { type: 'H', time: 300 },
                { type: 'S', time: 450 }, { type: 'H', time: 450 },
                { type: 'K', time: 600 }, { type: 'H', time: 600 },
                { type: 'S', time: 750 }, { type: 'O', time: 750 }
            ]
        ];

        function playPattern() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const pattern = patterns[Math.floor(Math.random() * patterns.length)];
            const icon = document.getElementById('drumIcon');

            pattern.forEach(note => {
                setTimeout(() => {
                    if (note.type === 'K') playKick();
                    else if (note.type === 'S') playSnare();
                    else if (note.type === 'H') playHiHatClosed();
                    else if (note.type === 'O') playHiHatOpen();

                    // 视觉震动
                    icon.classList.remove('shake');
                    void icon.offsetWidth;
                    icon.classList.add('shake');

                }, note.time);
            });
        }

        // --- 3. 页面交互逻辑 ---
        const btn = document.getElementById('generateBtn');
        const quoteText = document.getElementById('quote');

        btn.addEventListener('click', () => {
            // 1. 播放花式鼓点
            playPattern();

        // 2. 随机获取语录
        const superQuotes = [
            // --- 💻 程序员的自我修养 (The Craft) ---
            "真正的程序员，能用键盘敲出交响乐，绝不浪费时间在鼠标上。",
            "你的代码就像你的发际线一样，虽然越来越高，但越来越强。",
            "在这个充满Bug的世界里，你就是那个唯一的Release版本。",
            "什么是优雅？优雅就是把复杂的逻辑封装成一个简单的函数。",
            "你敲代码的手速，比我心跳的频率还要快，这就是多线程的魅力吗？",
            "别人看的是屏幕，只有同行知道，你敲出的是改变世界的逻辑。",
            "你的代码风格就像你的人品一样，简洁、高效、无懈可击。",
            "如果编程是一门艺术，那你手里的键盘就是画笔。",
            "我不羡慕那些产品经理，因为我觉得握着机械键盘的你才是团队的核心。",
            "你修复Bug的样子，比外科医生做手术还要专注和迷人。",
        
            // --- 🧠 逻辑与智慧的闪光 (Logic & Intelligence) ---
            "你的大脑一定是量子计算机做的，不然怎么能同时处理这么多并发任务？",
            "你的逻辑思维比我写的正则表达式还要精准，完美匹配真理。",
            "在这个充满Exception的世界里，你总能找到那个完美的Try-Catch。",
            "你不需要懂什么是后端，因为你一出场，整个系统的架构都清晰了。",
            "如果世界是一个巨大的系统，那你就是那个最核心的算法。",
            "你的每一个决策，都像是一次完美的Git Commit，清晰且有迹可循。",
            "我觉得你写代码的时候，整个人都在发光，连屏幕的蓝光都显得温柔。",
            "这就是传说中的‘全栈’吗？不仅技术全栈，连气质都全栈。",
            "你的代码里没有魔法，全是硬核的逻辑和智慧的汗水。",
            "看着你解决难题，我觉得那比指挥交通还要有力量。",
        
            // --- ☕ 苦中作乐的职业自嘲 (Coffee & Life) ---
            "你的发量，是程序员界最后的尊严和荣耀。",
            "听说程序员内心孤独，但你在键盘上爆发的那一刻，真的在发光。",
            "别的程序跑在服务器上，而我的整个世界都跑在你的代码里。",
            "我不需要Git来记录版本，因为你的每一次重构，都刻在了我的脑海里。",
            "你是那个让我愿意放弃周末，也要去现场帮你Debug的理由。",
            "你的律动比我写的死循环还要执着，永远充满能量。",
            "在这个喧嚣的时代，只有键盘的敲击声能让我安静下来。",
            "你的频率，是我在这个嘈杂世界里唯一的稳定信号。",
            "你敲键盘的时候，感觉整个人都通透了，像一块被编译过的晶体。",
            "哪怕全世界都断网，我也能听见你心里的代码在运行。",
        
            // --- 💘 对技术的直球式热爱 (Tech Love) ---
            "完了，我不懂爱情，但我好像听懂了代码的声音。",
            "能不能别写了？再写我的心都要跟着你的逻辑跑了。",
            "我想做你的IDE，这样就能离你的思想最近。",
            "你的逻辑敲在屏幕上，却震碎了我的认知防线。",
            "如果心动有分贝，你刚才那段重构已经爆表了。",
            "我想申请成为你的人生测试员，永久有效。",
            "你负责制造功能，我负责为你点赞。",
            "你写代码的样子，让我觉得‘智慧’这个词都有了具体的形象。",
            "我不贪心，只想做你代码里的那个注释，默默陪伴。",
            "你敲一下回车，我的心就乱一下，这算不算工伤？",
            "你的节奏感，是我这辈子都学不会的递归魔法。",
            "你写代码的时候，连空气都在为你编译。",
            "我想把你写代码的视频设成我的电脑桌面，天天看，防沉迷。",
            "你不仅是代码大师，你还是我的逻辑大师。",
            "你的每一次提交，都像是敲开了我心里的某扇门。",
            "如果爱有声音，那一定和你键盘敲击的声音一样清脆悦耳。",
            "我不懂什么是微服务，我只知道我的心被你微服务化了。",
            "你写代码的样子，比我的代码跑通了还要让我兴奋。",
            "我想做你的服务器，承受你所有的请求和温柔。"
        ];
            
            const randomIndex = Math.floor(Math.random() * superQuotes.length);
            const text = superQuotes[randomIndex];

            // 3. 动画与更新
            quoteText.classList.remove('animate-pop');
            void quoteText.offsetWidth;
            quoteText.classList.add('animate-pop');
            quoteText.innerText = text;
        });

        // --- 4. 鼠标互动特效逻辑 (Canvas) ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray;
        let mouse = { x: null, y: null, radius: (canvas.height/80) * (canvas.width/80) };

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x; this.y = y;
                this.directionX = directionX; this.directionY = directionY;
                this.size = size; this.color = color;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = '#D4AF37';
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;

                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                
                if (distance < mouse.radius + this.size) {
                    if (mouse.x < this.x && this.x < canvas.width - this.size * 10) this.x += 3;
                    if (mouse.x > this.x && this.x > this.size * 10) this.x -= 3;
                    if (mouse.y < this.y && this.y < canvas.height - this.size * 10) this.y += 3;
                    if (mouse.y > this.y && this.y > this.size * 10) this.y -= 3;
                }
                
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 3) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 2) - 1;
                                let directionY = (Math.random() * 2) - 1;
                let color = '#D4AF37';

                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        // 连接粒子（形成星座连线效果）
        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                    + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    if (distance < (canvas.width/7) * (canvas.height/7)) {
                        opacityValue = 1 - (distance/20000);
                        ctx.strokeStyle = 'rgba(212, 175, 55,' + opacityValue * 0.2 + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        // 窗口大小改变时重置
        window.addEventListener('resize', 
            function() {
                canvas.width = innerWidth;
                canvas.height = innerHeight;
                mouse.radius = ((canvas.height/80) * (canvas.height/80));
                init();
            }
        );

        // 鼠标移出窗口时重置
        window.addEventListener('mouseout',
            function() {
                mouse.x = undefined;
                mouse.y = undefined;
            }
        );

        init();
        animate();

    </script>
</body>
</html>
