<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>针对你的专属夸夸</title>
    <style>
        :root {
            --primary-color: #D4AF37;
            --text-color: #FFFFFF;
            --card-bg: rgba(255, 255, 255, 0.1);
            --card-border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(-45deg, #1a0b2e, #4a148c, #0d47a1, #2c3e50);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 90%;
            width: 400px;
            border: 1px solid var(--card-border);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--primary-color);
            margin-bottom: 30px;
            font-size: 24px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .drum-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
            animation: float 3s ease-in-out infinite;
        }

        /* 敲击动画类 */
        .shake {
            animation: shake 0.1s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0) rotate(-5deg); }
            20%, 80% { transform: translate3d(2px, 0, 0) rotate(5deg); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0) rotate(-5deg); }
            40%, 60% { transform: translate3d(4px, 0, 0) rotate(5deg); }
        }

        .quote-box {
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            border-left: 4px solid var(--primary-color);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .quote-text {
            font-size: 18px;
            line-height: 1.6;
            font-weight: 300;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .btn {
            background: linear-gradient(45deg, #D4AF37, #F9E076);
            color: #1a0b2e;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .animate-pop {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="drum-icon" id="drumIcon">🥁</div>
        <h1>退堂鼓手专属夸夸生成！</h1>
        
        <div class="quote-box">
            <p class="quote-text" id="quote">点击按钮，接收来自程序员的节奏赞美...</p>
        </div>

        <button class="btn" id="generateBtn">开始演奏 (生成)</button>
        
        <div class="footer">
            Designed by Your Programmer Friend: [ H·L ]
        </div>
    </div>

    <script>
        // --- 1. 音频合成引擎 (Web Audio API) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        // 底鼓
        function playKick() {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.5);
        }

        // 军鼓
        function playSnare() {
            const bufferSize = audioCtx.sampleRate * 0.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'highpass';
            noiseFilter.frequency.value = 1000;
            const noiseGain = audioCtx.createGain();
            
            noise.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            
            noiseGain.gain.setValueAtTime(0.8, audioCtx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            noise.start(audioCtx.currentTime);

            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.connect(oscGain);
            oscGain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(250, audioCtx.currentTime);
            oscGain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            oscGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // 闭镲
        function playHiHatClosed() {
            const bufferSize = audioCtx.sampleRate * 0.1;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const bandpass = audioCtx.createBiquadFilter();
            bandpass.type = 'bandpass';
            bandpass.frequency.value = 10000;
            const highpass = audioCtx.createBiquadFilter();
            highpass.type = 'highpass';
            highpass.frequency.value = 7000;
            const gainNode = audioCtx.createGain();
            
            noise.connect(bandpass);
            bandpass.connect(highpass);
            highpass.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            noise.start(audioCtx.currentTime);
        }

        // 开镲
        function playHiHatOpen() {
            const bufferSize = audioCtx.sampleRate * 0.4;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const bandpass = audioCtx.createBiquadFilter();
            bandpass.type = 'bandpass';
            bandpass.frequency.value = 10000;
            const highpass = audioCtx.createBiquadFilter();
            highpass.type = 'highpass';
            highpass.frequency.value = 7000;
            const gainNode = audioCtx.createGain();
            
            noise.connect(bandpass);
            bandpass.connect(highpass);
            highpass.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            noise.start(audioCtx.currentTime);
        }

        // --- 2. 节奏编排系统 ---
        const patterns = [
            // 1. 经典摇滚
            [
                { type: 'K', time: 0 }, { type: 'H', time: 0 },
                { type: 'S', time: 300 }, { type: 'H', time: 300 },
                { type: 'K', time: 600 },
                { type: 'S', time: 900 }, { type: 'O', time: 900 }
            ],
            // 2. 三连音
            [
                { type: 'K', time: 0 }, { type: 'H', time: 0 },
                { type: 'S', time: 200 }, { type: 'H', time: 200 },
                { type: 'S', time: 400 }, { type: 'H', time: 400 },
                { type: 'K', time: 600 }, { type: 'H', time: 600 },
                { type: 'S', time: 800 }, { type: 'O', time: 800 }
            ],
            // 3. 双底鼓
            [
                { type: 'K', time: 0 }, { type: 'H', time: 0 },
                { type: 'K', time: 200 }, { type: 'H', time: 200 },
                { type: 'S', time: 400 }, { type: 'H', time: 400 },
                { type: 'K', time: 600 },
                { type: 'S', time: 900 }, { type: 'O', time: 900 }
            ],
            // 4. 切分节奏
            [
                { type: 'K', time: 0 }, { type: 'H', time: 0 },
                { type: 'S', time: 250 }, { type: 'H', time: 250 },
                { type: 'K', time: 500 }, { type: 'H', time: 500 },
                { type: 'S', time: 850 }, { type: 'O', time: 850 }
            ],
            // 5. 快速滚奏
            [
                { type: 'K', time: 0 }, { type: 'H', time: 0 },
                { type: 'S', time: 150 }, { type: 'H', time: 150 },
                { type: 'K', time: 300 }, { type: 'H', time: 300 },
                { type: 'S', time: 450 }, { type: 'H', time: 450 },
                { type: 'K', time: 600 }, { type: 'H', time: 600 },
                { type: 'S', time: 750 }, { type: 'O', time: 750 }
            ]
        ];

        function playPattern() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const pattern = patterns[Math.floor(Math.random() * patterns.length)];
            const icon = document.getElementById('drumIcon');

            pattern.forEach(note => {
                setTimeout(() => {
                    if (note.type === 'K') playKick();
                    else if (note.type === 'S') playSnare();
                    else if (note.type === 'H') playHiHatClosed();
                    else if (note.type === 'O') playHiHatOpen();

                    // 视觉震动
                    icon.classList.remove('shake');
                    void icon.offsetWidth;
                    icon.classList.add('shake');

                }, note.time);
            });
        }

        // --- 3. 页面交互逻辑 ---
        const btn = document.getElementById('generateBtn');
        const quoteText = document.getElementById('quote');

        btn.addEventListener('click', () => {
            // 1. 播放花式鼓点
            playPattern();

            // 2. 随机获取语录
            const superQuotes = [
                // --- 💻 程序员式硬核浪漫 (Code & Logic) ---
                "你的节奏感就像我的代码逻辑一样，虽然复杂，但充满了美感。",
                "如果我的心跳是一个程序，那你就是那个唯一的死循环。",
                "生活可能充满了Bug，但你的演奏永远是Release版本。",
                "我对你的喜欢，就像 `while(true)`，没有出口，只有运行。",
                "你不需要懂什么是后端，因为你一出场，我的前端界面就全乱了。",
                "你的鼓点就是我的 `console.log`，每一次敲击都让我确认：我还活着。",
                "别的程序跑在服务器上，而我的整个世界都跑在你的节奏里。",
                "你就像我代码里的 `return 0`，是我唯一的归宿。",
                "我的大脑是单线程的，但在处理你的鼓声时，我开启了多线程并发。",
                "你敲鼓的样子，比我修复了100个报错后的代码还要优雅。",
                "如果世界是一个巨大的系统，那你就是那个最核心的算法。",
                "我不需要 `Git` 来记录版本，因为你的每一次击打，都刻在了我的脑海里。",
                "你的律动比我写的正则表达式还要精准，完美匹配我的心跳。",
                "你是那个让我愿意放弃周末加班，也要去现场 `Debug` (看你) 的理由。",
                "在这个充满 `Exception` 的世界里，你是我唯一的 `Try-Catch`。",
            
                // --- 🥁 鼓手专属高光时刻 (Drummer & Stage) ---
                "别人看的是热闹，只有我知道，你手里的鼓槌敲出的是灵魂的频率。",
                "听说INFJ内心细腻，但你在鼓后面爆发的那一刻，真的在发光。",
                "打鼓的女孩子最酷了，尤其是那种又酷又温柔的反差感。",
                "你的律动感太强了，连我这个写代码的直男都忍不住想跟着点头。",
                "虽然我不懂乐理，但我懂欣赏。你在舞台上的样子，比4K屏幕还清晰。",
                "你敲的不是鼓，是我的心巴。",
                "我觉得你打鼓的时候，整个人都在发光，连头发丝都有节奏。",
                "这就是传说中的‘又飒又美’吗？爱了爱了。",
                "你的鼓声里有故事，而我想做那个听故事的人。",
                "看着你挥动鼓槌，我觉得那比指挥交通还要有力量。",
                "低音鼓是我的心跳，军鼓是你的回应，镲片是你眼里的光。",
                "你坐在鼓凳上的样子，比坐在王座上的女王还要迷人。",
                "原来‘掌控全场’这四个字，是可以具象化成你打鼓的样子的。",
                "你流汗的样子，比任何精修图都要生动一万倍。",
                "当你戴上耳机，世界就只剩下你和鼓，而我的世界就只剩下你。",
                "你的双手在鼓面上跳舞，我的视线在你身上迷路。",
                "那种把力量控制在指尖的感觉，真的太性感了。",
                "我不羡慕主唱，因为我觉得握着鼓槌的你才是乐队的灵魂。",
            
                // --- 🧠 INFJ与灵魂共鸣 (Soul & Vibe) ---
                "INFJ的温柔是藏在骨子里的，但你的爆发力是藏在温柔里的。",
                "我知道你平时很安静，所以更珍惜你在鼓后面释放的那个自己。",
                "你的鼓声有一种治愈力，像是给混乱的世界做了一次心理按摩。",
                "也许这就是INFJ的魅力吧，平时温温柔柔，一上手就是千军万马。",
                "你的内心世界一定很丰富，不然敲不出这么有层次感的节奏。",
                "你不需要说话，你的鼓声已经替你把心里话都说完了。",
                "我听到了你鼓声里的孤独，也听到了你对抗孤独的力量。",
                "在这个喧嚣的时代，只有你的鼓声能让我安静下来。",
                "你的频率，是我在这个嘈杂世界里唯一的信号。",
                "你打鼓的时候，感觉整个人都通透了，像一块被敲碎又重组的水晶。",
            
                // --- 💘 直球式心动暴击 (Crush & Love) ---
                "完了，我不懂音乐，但我好像听懂了爱情的声音。",
                "能不能别敲了？再敲我的心都要跳出来了。",
                "我想做你的鼓谱架，这样就能离你最近。",
                "你的鼓槌敲在鼓面上，却震碎了我的防线。",
                "如果心动有分贝，你刚才那段Solo已经爆表了。",
                "我想申请成为你的人生听众，永久有效。",
                "你负责制造节奏，我负责为你心动。",
                "你打鼓的样子，让我觉得‘才华’这个词都有了性别。",
                "我不贪心，只想做你鼓声里的那个休止符。",
                "你敲一下，我的心就乱一下，这算不算工伤？",
                "哪怕全世界都静音，我也能听见你心里的鼓点。",
                "你的节奏感，是我这辈子都学不会的魔法。",
                "你敲鼓的时候，连空气都在为你共振。",
                "我想把你打鼓的视频设成我的电脑桌面，天天看，防沉迷。",
                "你不仅是节奏大师，你还是我的心动大师。",
                "你的每一次重击，都像是敲开了我心里的某扇门。",
                "如果爱有声音，那一定和你敲鼓的声音一样震耳欲聋。",
                "我不懂什么是切分音，我只知道我的心跳被你切分了。",
                "你打鼓的样子，比我的代码跑通了还要让我兴奋。",
                "我想做你的鼓皮，承受你所有的力度和温柔。"
            ];
            
            const randomIndex = Math.floor(Math.random() * superQuotes.length);
            const text = superQuotes[randomIndex];

            // 3. 动画与更新
            quoteText.classList.remove('animate-pop');
            void quoteText.offsetWidth;
            quoteText.classList.add('animate-pop');
            quoteText.innerText = text;
        });

        // --- 4. 鼠标互动特效逻辑 (Canvas) ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray;
        let mouse = { x: null, y: null, radius: (canvas.height/80) * (canvas.width/80) };

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x; this.y = y;
                this.directionX = directionX; this.directionY = directionY;
                this.size = size; this.color = color;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = '#D4AF37';
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;

                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                
                if (distance < mouse.radius + this.size) {
                    if (mouse.x < this.x && this.x < canvas.width - this.size * 10) this.x += 3;
                    if (mouse.x > this.x && this.x > this.size * 10) this.x -= 3;
                    if (mouse.y < this.y && this.y < canvas.height - this.size * 10) this.y += 3;
                    if (mouse.y > this.y && this.y > this.size * 10) this.y -= 3;
                }
                
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 3) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 2) - 1;
                                let directionY = (Math.random() * 2) - 1;
                let color = '#D4AF37';

                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        // 连接粒子（形成星座连线效果）
        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                    + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    if (distance < (canvas.width/7) * (canvas.height/7)) {
                        opacityValue = 1 - (distance/20000);
                        ctx.strokeStyle = 'rgba(212, 175, 55,' + opacityValue * 0.2 + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        // 窗口大小改变时重置
        window.addEventListener('resize', 
            function() {
                canvas.width = innerWidth;
                canvas.height = innerHeight;
                mouse.radius = ((canvas.height/80) * (canvas.height/80));
                init();
            }
        );

        // 鼠标移出窗口时重置
        window.addEventListener('mouseout',
            function() {
                mouse.x = undefined;
                mouse.y = undefined;
            }
        );

        init();
        animate();

    </script>
</body>
</html>
